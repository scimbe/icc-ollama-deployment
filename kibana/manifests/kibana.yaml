apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${KIBANA_DEPLOYMENT_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:${KIBANA_VERSION}
        resources:
          limits:
            memory: "1Gi"
            cpu: "1"
          requests:
            memory: "512Mi"
            cpu: "0.5"
        ports:
        - containerPort: 5601
          name: http
          protocol: TCP
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://${ES_SERVICE_NAME}:9200"
        - name: XPACK_SECURITY_ENABLED
          value: "false"
        - name: ELASTICSEARCH_SSL_VERIFICATIONMODE
          value: "none"
        - name: XPACK_SECURITY_ENCRYPTIONKEY
          value: "somesuperlongkeyatleast32characters"
        - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
          value: "somesuperlongkeyatleast32characters"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=768"
        # Remove explicit username to use default anonymous access since security is disabled
        # - name: ELASTICSEARCH_USERNAME
        #  value: "elastic"
        # - name: ELASTICSEARCH_PASSWORD
        #  value: "changeme"
        - name: XPACK_REPORTING_ENABLED
          value: "false"
        - name: LOGGING_VERBOSE
          value: "true"
        - name: SERVER_MAXPAYLOADBYTES
          value: "10485760"
        readinessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: kibana-data
          mountPath: /usr/share/kibana/data
      volumes:
      - name: kibana-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${KIBANA_SERVICE_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: kibana
spec:
  ports:
  - port: 5601
    protocol: TCP
    targetPort: 5601
  selector:
    app: kibana