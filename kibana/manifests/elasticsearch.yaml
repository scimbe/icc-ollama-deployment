apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${ES_DEPLOYMENT_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: elasticsearch
spec:
  serviceName: ${ES_SERVICE_NAME}
  replicas: ${ES_REPLICAS}
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
        resources:
          limits:
            memory: ${ES_MEMORY_LIMIT}
            cpu: "1"
          requests:
            memory: "1Gi"
            cpu: "0.5"
        ports:
        - containerPort: 9200
          name: rest
          protocol: TCP
        - containerPort: 9300
          name: inter-node
          protocol: TCP
        env:
        - name: cluster.name
          value: icc-es-cluster
        - name: node.name
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: discovery.seed_hosts
          value: "${ES_SERVICE_NAME}"
        - name: cluster.initial_master_nodes
          value: "${ES_DEPLOYMENT_NAME}-0"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: xpack.security.enabled
          value: "false"  # Sicherheit deaktivieren, um Bootstrapprüfungen zu umgehen
        - name: bootstrap.memory_lock
          value: "false"
        - name: discovery.type
          value: "single-node"  # Single-Node-Modus für einfachere Konfiguration
        - name: ELASTIC_PASSWORD
          value: "changeme"
        - name: xpack.ml.enabled
          value: "true"
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
      volumes:
      - name: data
        emptyDir: {}  # Verwendung von emptyDir statt PersistentVolumeClaim
---
apiVersion: v1
kind: Service
metadata:
  name: ${ES_SERVICE_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: elasticsearch
spec:
  ports:
  - port: 9200
    name: rest
    protocol: TCP
    targetPort: 9200
  - port: 9300
    name: inter-node
    protocol: TCP
    targetPort: 9300
  selector:
    app: elasticsearch
  clusterIP: None  # Headless service für StatefulSet
